version: '3.9'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: bg_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  neo4j:
    image: neo4j:5.15-community
    container_name: bg_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/blueguardian2024
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./data/knowledge_base:/import
    restart: unless-stopped

  zep:
    image: ghcr.io/getzep/zep:latest
    container_name: bg_zep
    ports:
      - "8000:8000"
    environment:
      ZEP_STORE_TYPE: postgres
      ZEP_STORE_POSTGRES_DSN: postgresql://zep:zep@zep_postgres:5432/zep
    depends_on:
      - zep_postgres
    restart: unless-stopped

  zep_postgres:
    image: postgres:15
    container_name: bg_zep_postgres
    environment:
      POSTGRES_USER: zep
      POSTGRES_PASSWORD: zep
      POSTGRES_DB: zep
    volumes:
      - zep_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bg_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  ollama_models:
  neo4j_data:
  neo4j_logs:
  zep_pg_data:
